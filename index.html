<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHAIYR TRAVEL CRM v11 (Fix)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #004d40; --secondary: #00796b; --bg: #f4f6f9; }
        body { background-color: var(--bg); font-family: sans-serif; }
        
        .sidebar {
            height: 100vh; width: 250px; position: fixed; top: 0; left: 0;
            background-color: var(--primary); color: white; padding-top: 20px;
            z-index: 1000;
        }
        .sidebar a {
            padding: 12px 20px; text-decoration: none; font-size: 16px; color: white; display: block; cursor: pointer;
        }
        .sidebar a:hover { background-color: var(--secondary); border-left: 4px solid #ffd700; }
        .main-content { margin-left: 250px; padding: 20px; }
        
        .badge-status { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; }
        .st-quote { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .st-advance { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .st-paid { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .st-completed { background: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar span, .sidebar h4 { display: none; }
            .main-content { margin-left: 60px; padding: 10px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">KHAIYR</h4>
    <a onclick="showSection('packages')"><i class="fas fa-plane"></i> <span>Пакеттер</span></a>
    <a onclick="showSection('clients')"><i class="fas fa-users"></i> <span>Клиенттер</span></a>
    <a onclick="showSection('settings')"><i class="fas fa-cog"></i> <span>Баптаулар</span></a>
</div>

<div class="main-content">
    
    <div id="packages" class="section">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3><i class="fas fa-kaaba text-success"></i> Умра пакеттері</h3>
            <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Жаңа пакет</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Клиент</th>
                                <th>Пакет</th>
                                <th>Дата</th>
                                <th>Баға ($)</th>
                                <th>Статус</th>
                                <th>Әрекет</th>
                            </tr>
                        </thead>
                        <tbody id="packageList">
                            <tr><td colspan="6" class="text-center p-3">Кілттерді енгізген соң "Жаңарту" басыңыз...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="clients" class="section" style="display:none;">
        <h3>Клиенттер базасы</h3>
        <p>Клиенттер тізімі осында шығады...</p>
        <div id="clientsListDisplay"></div>
    </div>
    
    <div id="settings" class="section" style="display:none;">
        <h3>Баптаулар</h3>
        <div class="alert alert-warning">
            Supabase кілттерін осы жерге енгізіңіз. Оларсыз бағдарлама істемейді.
        </div>
        <div class="card p-3">
            <label>Supabase URL:</label>
            <input type="text" id="supaUrl" class="form-control mb-2" placeholder="https://xyz.supabase.co">
            <label>Supabase Key (Anon):</label>
            <input type="text" id="supaKey" class="form-control mb-2" placeholder="eyJhbG...">
            <button onclick="saveKeys()" class="btn btn-success">Кілттерді сақтау және Қосылу</button>
            <br>
            <small class="text-danger" id="connectionStatus"></small>
        </div>
    </div>

</div>

<div class="modal fade" id="newPackageModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Жаңа пакет рәсімдеу</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="pkgForm">
                    <div class="mb-3">
                        <label>Клиент:</label>
                        <select id="clientSelect" class="form-select" required>
                            <option value="">Жүктелуде...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Пакет түрі:</label>
                        <select id="pkgType" class="form-select" onchange="applyTemplate()">
                            <option value="">Таңдаңыз...</option>
                            <option value="Умра Эконом">Умра Эконом (1150$)</option>
                            <option value="Умра Стандарт">Умра Стандарт (1300$)</option>
                            <option value="Умра VIP">Умра VIP (1600$)</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label>Баға ($):</label>
                            <input type="number" id="pkgPrice" class="form-control">
                        </div>
                        <div class="col-6 mb-3">
                            <label>Ұшу күні:</label>
                            <input type="date" id="pkgDate" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Статус:</label>
                        <select id="pkgStatus" class="form-select">
                            <option value="quote">🟡 Баға ұсынысы</option>
                            <option value="advance">🔵 Аванс төленді</option>
                            <option value="paid">🟢 Толық төленді</option>
                            <option value="completed">⚪ Аяқталды</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Жабу</button>
                <button type="button" class="btn btn-success" onclick="savePackage()">Сақтау</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. МӘЗІРДІ БАСҚАРУ (Бұл енді ең бірінші тұр, қате болса да істейді)
    function showSection(id) {
        document.querySelectorAll('.section').forEach(el => el.style.display = 'none');
        const activeSection = document.getElementById(id);
        if(activeSection) activeSection.style.display = 'block';
    }

    // --- ПАРАМЕТРЛЕРДІ ОҚУ ---
    let SUPABASE_URL = localStorage.getItem('supaUrl') || '';
    let SUPABASE_KEY = localStorage.getItem('supaKey') || '';
    let supabase = null;

    // Бет ашылғанда бірден тексереміз
    document.addEventListener('DOMContentLoaded', () => {
        // Баптаулар өрісін толтырып қоямыз (егер бұрын сақталған болса)
        document.getElementById('supaUrl').value = SUPABASE_URL;
        document.getElementById('supaKey').value = SUPABASE_KEY;

        if (SUPABASE_URL && SUPABASE_KEY) {
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                initApp();
            } catch (err) {
                console.error("Supabase қатесі:", err);
                document.getElementById('connectionStatus').innerText = "Қате: " + err.message;
            }
        } else {
            // Егер кілт жоқ болса, бірден Баптауларды ашамыз
            showSection('settings');
        }
    });

    function saveKeys() {
        const url = document.getElementById('supaUrl').value.trim();
        const key = document.getElementById('supaKey').value.trim();
        
        if(!url || !key) { alert("Екі жолақты да толтырыңыз!"); return; }

        localStorage.setItem('supaUrl', url);
        localStorage.setItem('supaKey', key);
        alert("Кілттер сақталды! Бет жаңартылады...");
        location.reload();
    }

    // --- НЕГІЗГІ ЛОГИКА ---
    async function initApp() {
        if(!supabase) return;
        try {
            await loadClients();
            await loadPackages();
        } catch (e) {
            console.error("Деректерді алу қатесі:", e);
        }
    }

    async function loadClients() {
        const select = document.getElementById('clientSelect');
        const { data, error } = await supabase.from('clients').select('id, name, phone');
        
        if (error) { console.log("Клиент жоқ немесе қате:", error); return; }
        
        select.innerHTML = '<option value="">-- Клиентті таңдаңыз --</option>';
        if(data) {
            data.forEach(client => {
                let opt = document.createElement('option');
                opt.value = client.id;
                opt.textContent = client.name;
                select.appendChild(opt);
            });
        }
    }

    async function loadPackages() {
        const tbody = document.getElementById('packageList');
        const { data, error } = await supabase
            .from('packages')
            .select('*, clients(name, phone)')
            .order('created_at', { ascending: false });

        if (error) { 
            tbody.innerHTML = `<tr><td colspan="6" class="text-danger">Қате: ${error.message} <br> Баптауларды тексеріңіз.</td></tr>`;
            return; 
        }

        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center">Деректер жоқ. Жаңа пакет қосыңыз!</td></tr>`;
            return;
        }

        tbody.innerHTML = '';
        data.forEach(item => {
            let badge = 'st-quote';
            let statusText = 'Ұсыныс';
            if(item.status == 'advance') { badge = 'st-advance'; statusText = 'Аванс'; }
            if(item.status == 'paid') { badge = 'st-paid'; statusText = 'Төленді'; }
            if(item.status == 'completed') { badge = 'st-completed'; statusText = 'Аяқталды'; }

            let phone = item.clients?.phone || '';
            let waBtn = '';
            if(phone) {
                let msg = `Ассалаумағалейкум, ${item.clients?.name}! Умра тур бойынша...`;
                waBtn = `<button class="btn btn-sm btn-success" onclick="window.open('https://wa.me/${phone}?text=${encodeURIComponent(msg)}')"><i class="fab fa-whatsapp"></i></button>`;
            }

            let tr = `
                <tr>
                    <td><strong>${item.clients?.name || 'Белгісіз'}</strong><br><small class="text-muted">${phone}</small></td>
                    <td>${item.type}</td>
                    <td>${item.flight_date || '-'}</td>
                    <td><b>$${item.price}</b></td>
                    <td><span class="badge-status ${badge}">${statusText}</span></td>
                    <td>${waBtn}</td>
                </tr>
            `;
            tbody.innerHTML += tr;
        });
    }

    function applyTemplate() {
        const type = document.getElementById('pkgType').value;
        const priceInput = document.getElementById('pkgPrice');
        if (type === 'Умра Эконом') priceInput.value = 1150;
        else if (type === 'Умра Стандарт') priceInput.value = 1300;
        else if (type === 'Умра VIP') priceInput.value = 1600;
    }

    async function savePackage() {
        const client_id = document.getElementById('clientSelect').value;
        const type = document.getElementById('pkgType').value;
        const price = document.getElementById('pkgPrice').value;
        const flight_date = document.getElementById('pkgDate').value;
        const status = document.getElementById('pkgStatus').value;

        if(!client_id) return alert('Клиентті таңдаңыз!');
        if(!supabase) return alert('Supabase қосылмаған!');

        const { error } = await supabase.from('packages').insert([{
            client_id, type, price, flight_date, status
        }]);

        if(error) alert('Қате: ' + error.message);
        else {
            const modal = bootstrap.Modal.getInstance(document.getElementById('newPackageModal'));
            modal.hide();
            loadPackages();
        }
    }

    function openModal() {
        new bootstrap.Modal(document.getElementById('newPackageModal')).show();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
